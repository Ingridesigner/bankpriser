name: Scrape bankpriser

on:
  schedule:
    - cron: "0 7 * * 1"  # Mandag 07:00 UTC (09:00 norsk tid)
  workflow_dispatch:       # Kan også kjøres manuelt fra GitHub

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium --with-deps

      - name: Kjør scraper
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python bankpriser.py

      - name: Commit og push oppdatert HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bankpriser.html bankpriser_snapshot.json
          git diff --staged --quiet || git commit -m "Oppdater bankpriser $(date +'%Y-%m-%d')"
          git push
